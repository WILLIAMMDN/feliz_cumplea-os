<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="images/gift.png" type="image/x-icon">
  <link rel="stylesheet" href="css/index.css">

  <!-- Document Title -->
  <title>holaaa</title>

  <style>
    .snoopy {
      position: absolute;
      width: 100px;
      z-index: 1;
      animation: floatAround 10s infinite ease-in-out alternate;
    }

    .snoopy1 {
      top: 20%;
      left: 10%;
      animation-delay: 0s;
    }

    .snoopy2 {
      top: 40%;
      left: 70%;
      animation-delay: 2s;
    }

    .snoopy3 {
      top: 70%;
      left: 30%;
      animation-delay: 4s;
    }

    @keyframes floatAround {
      0% {
        transform: translate(0, 0) rotate(0deg);
      }

      25% {
        transform: translate(30px, -20px) rotate(10deg);
      }

      50% {
        transform: translate(-20px, 20px) rotate(-10deg);
      }

      75% {
        transform: translate(20px, -10px) rotate(5deg);
      }

      100% {
        transform: translate(0, 0) rotate(0deg);
      }
    }
  </style>
</head>

<body>
  <!-- Background -->
  <div class="night"></div>

  <!-- Animated Snoopy Images -->
  <img src="images/snoopy1.gif" alt="Snoopy" class="snoopy snoopy1">
  <img src="images/snoopy2.gif" alt="Snoopy" class="snoopy snoopy2">
  <img src="images/snoopy3.gif" alt="Snoopy" class="snoopy snoopy3">

  <!-- Title -->
  <h1 class="title"></h1>

  <!-- Button -->
  <div style="position: absolute; top: 60vh; width: 100%; display: flex; justify-content: center;">

          d="M10,21.236,6.755,14.745.264,11.5,6.755,8.255,10,1.764l3.245,6.491L19.736,11.5l-6.491,3.245ZM18,21l1.5,3L21,21l3-1.5L21,18l-1.5-3L18,18l-3,1.5ZM19.333,4.667,20.5,7l1.167-2.333L24,3.5,21.667,2.333,20.5,0,19.333,2.333,17,3.5Z">
        </path>
      </svg>
      <span class="text">ABRE</span>
